<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Civil Air Patrol Email Signature Generator</title>
  <link rel="shortcut icon" href="favicon.png" />

  <style>
    /* reset */
    html, body, div, span, applet, object, iframe,
    h1, h2, h3, h4, h5, h6, p, blockquote, pre, a,
    abbr, acronym, address, big, cite, code, del, dfn,
    em, img, ins, kbd, q, s, samp, small, strike, strong,
    sub, sup, tt, var, b, u, i, center, dl, dt, dd, ol, ul, li,
    fieldset, form, label, legend, table, caption, tbody, tfoot,
    thead, tr, th, td, article, aside, canvas, details, embed,
    figure, figcaption, footer, header, hgroup, menu, nav, output,
    ruby, section, summary, time, mark, audio, video {
      margin: 0; padding: 0; border: 0; font-size: 100%;
      font: inherit; vertical-align: baseline;
    }
    article, aside, details, figcaption, figure, footer, header,
    hgroup, menu, nav, section { display: block; }
    body { line-height: 1; }
    ol, ul { list-style: none; }
    table { border-collapse: collapse; border-spacing: 0; }

    /* app layout */
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #000;
      background: #f3f4f6;
      display: flex;
      min-height: 100vh;
    }
    a { color: rgb(0, 20, 137); }
    body > div { padding: 50px; }

    .left {
      background: #fff;
      flex: 1 1 50%;
      min-width: 420px;
      max-width: 720px;
      overflow-y: auto;
      border-right: 1px solid #f3f4f6;
    }
    .right {
      flex: 1 1 50%;
      min-width: 320px;
      background: #fff;
      border-left: 1px solid #f3f4f6;
    }

    h1 {
      color: rgb(186, 12, 47);
      font-size: 30px;
      line-height: 1.3;
      font-weight: 600;
      margin: 0 0 10px;
    }
    p { margin: 8px 0; line-height: 1.45; }

    form {
      margin: 25px 0 0;
      padding: 25px 0 0;
      border-top: 1px solid #f3f4f6;
    }
    form > div {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 0 0 15px;
    }

    label {
      display: flex;
      gap: 10px;
      align-items: baseline;
      font-weight: 600;
      white-space: nowrap;
    }
    .req { color: #fc2050; }
    .note {
      margin-left: auto;
      color: rgb(158, 162, 162);
      font-size: 12px;
      font-weight: 400;
      white-space: normal;
      text-align: right;
      line-height: 1.3;
    }

    input, select, textarea {
      border: 1px solid rgb(158, 162, 162);
      border-radius: 5px;
      font-size: 16px;
      line-height: 1.3;
      font-weight: 400;
      padding: 10px;
      background: #fff;
      color: #000;
    }
    textarea { resize: vertical; }

    .dual {
      display: flex;
      flex-direction: row;
      gap: 15px;
      align-items: stretch;
    }
    .dual > * { flex: 1 1 0; }

    footer {
      color: rgb(158, 162, 162);
      font-size: 12px;
      padding: 50px 0 20px;
    }
    footer a { color: inherit; }

    /* subtle warning for duty position lines */
    .subtle-warning {
      font-size: 12px;
      color: rgb(158, 162, 162);
      line-height: 1.35;
      margin-top: 2px;
      opacity: 0;
      transition: opacity 150ms ease-in-out;
    }
    .subtle-warning.show { opacity: 1; }

    /* right preview */
    .preview-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 20px 20px 0 20px;
    }
    .preview-toolbar label { font-weight: 600; white-space: nowrap; }
    .preview-wrap { padding: 20px; }
    .preview-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }
    .preview-code {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    .hidden { display: none !important; }
  </style>
</head>

<body>
  <div class="left">
    <h1>Civil Air Patrol Email Signature Generator</h1>
    <p>Fill out your details below, and verify the preview in the right column is correct.</p>

    <form id="sig-form" autocomplete="off">
      <div>
        <label for="type">Signature Type</label>
        <select id="type">
          <option value="generic" selected>Default</option>
          <option value="plaintext">Plain Text</option>
          <option value="mobile">Abbreviated (Mobile)</option>
        </select>
      </div>

      <div>
        <label for="grade">Grade &amp; Name <span class="req">*</span></label>
        <div class="dual">
          <select id="grade_type">
            <option value="Adult" selected>Adult</option>
            <option value="Cadet">Cadet</option>
          </select>

          <select id="grade">
            <!-- No Grade options -->
            <optgroup label="No Grade">
              <option value="" data-any="true">No grade</option>
            </optgroup>

            <!-- NEW: Courtesy titles -->
            <optgroup label="Courtesy Titles">
              <option value="Mr." data-any="true">Mr.</option>
              <option value="Ms." data-any="true">Ms.</option>
              <option value="Mrs." data-any="true">Mrs.</option>
            </optgroup>

            <optgroup label="Cadet Enlisted">
              <option value="Airman Basic" data-cadet="true" disabled>Airman Basic</option>
              <option value="Airman" data-cadet="true" disabled>Airman</option>
              <option value="Airman 1st Class" data-cadet="true" disabled>Airman 1st Class</option>
              <option value="Senior Airman" data-cadet="true" disabled>Senior Airman</option>

              <option value="Staff Sgt." data-cadet="true" disabled>Staff Sgt.</option>
              <option value="Tech. Sgt." data-cadet="true" disabled>Tech. Sgt.</option>
              <option value="Master Sgt." data-cadet="true" disabled>Master Sgt.</option>
              <option value="Senior Master Sgt." data-cadet="true" disabled>Senior Master Sgt.</option>
              <option value="Chief Master Sgt." data-cadet="true" disabled>Chief Master Sgt.</option>
            </optgroup>

            <optgroup label="Cadet Officer">
              <option value="2nd Lt." data-cadet="true" disabled>2nd Lt.</option>
              <option value="1st Lt." data-cadet="true" disabled>1st Lt.</option>
              <option value="Capt." data-cadet="true" disabled>Capt.</option>
              <option value="Maj." data-cadet="true" disabled>Maj.</option>
              <option value="Lt. Col." data-cadet="true" disabled>Lt. Col.</option>
              <option value="Col." data-cadet="true" disabled>Col.</option>
            </optgroup>

            <optgroup label="Adult">
              <option value="Staff Sgt." data-adult="true">Staff Sgt.</option>
              <option value="Tech. Sgt." data-adult="true">Tech. Sgt.</option>
              <option value="Master Sgt." data-adult="true">Master Sgt.</option>
              <option value="Senior Master Sgt." data-adult="true">Senior Master Sgt.</option>
              <option value="Chief Master Sgt." data-adult="true">Chief Master Sgt.</option>

              <option value="" data-adult="true">Senior Member</option>
              <option value="Flight Officer" data-adult="true">Flight Officer</option>
              <option value="Tech. Flight Officer" data-adult="true">Tech. Flight Officer</option>
              <option value="Senior Flight Officer" data-adult="true">Senior Flight Officer</option>

              <option value="2nd Lt." data-adult="true" selected>2nd Lt.</option>
              <option value="1st Lt." data-adult="true">1st Lt.</option>
              <option value="Capt." data-adult="true">Capt.</option>
              <option value="Maj." data-adult="true">Maj.</option>
              <option value="Lt. Col." data-adult="true">Lt. Col.</option>
              <option value="Col." data-adult="true">Col.</option>
              <option value="Brig. Gen." data-adult="true">Brig. Gen.</option>
              <option value="Maj. Gen." data-adult="true">Maj. Gen.</option>
            </optgroup>
          </select>

          <input type="text" id="name" placeholder="Jane Doe" />
        </div>
      </div>

      <div id="f_wing" class="hidden">
        <label for="wing">
          Wing <span class="req">*</span>
          <span class="note">Use 4-letter Wing, 3-letter Region, or “HQ”; no squadron designators</span>
        </label>
        <input type="text" id="wing" placeholder="TXWG" />
      </div>

      <div id="f_title">
        <label for="title">
          Duty Position(s)
          <span class="note">Unit name followed by duty position</span>
          <span class="note">Max 2 lines</span>
        </label>

        <textarea
          id="title"
          rows="2"
          placeholder="Texas Wing Director of Operations&#10;Fort Worth Phoenix Comp. Sq. Commander"
        ></textarea>

        <div id="title_warning" class="subtle-warning" aria-live="polite">
          Maximum two lines allowed. Extra lines were removed.
        </div>
      </div>

      <div id="f_phone">
        <label>Phone Number(s)</label>

        <div class="dual">
          <select id="phone_1_type">
            <option value="M" selected>Mobile</option>
            <option value="H">Home</option>
            <option value="O">Office</option>
          </select>
          <input type="text" id="phone_1" placeholder="555.555.5555" />
        </div>

        <div class="dual">
          <select id="phone_2_type">
            <option value="M" selected>Mobile</option>
            <option value="H">Home</option>
            <option value="O">Office</option>
          </select>
          <input type="text" id="phone_2" placeholder="555.555.5555" />
        </div>

        <div class="dual">
          <select id="phone_3_type">
            <option value="M" selected>Mobile</option>
            <option value="H">Home</option>
            <option value="O">Office</option>
          </select>
          <input type="text" id="phone_3" placeholder="555.555.5555" />
        </div>
      </div>

      <div id="f_website">
        <label for="website_text">Wing/Region Website</label>
        <div class="dual">
          <input type="text" id="website_text" placeholder="Display Text" />
          <input type="text" id="website_url" placeholder="Link URL" />
        </div>
      </div>
    </form>

    <footer>
      Version 25. Last modified on March 2nd, 2026. Managed by
      <a href="mailto:Brand@cap.gov">Maj. Roman Vitanza</a>.
    </footer>
  </div>

  <div class="right">
    <div class="preview-toolbar">
      <label for="preview_mode">Preview:</label>
      <select id="preview_mode">
        <option value="rendered" selected>Rendered</option>
        <option value="code">Code</option>
      </select>
    </div>

    <div class="preview-wrap">
      <div class="preview-card">
        <div id="preview_rendered"></div>
        <pre id="preview_code" class="preview-code hidden"></pre>
      </div>
    </div>
  </div>

  <script>
    (function () {
      let type = "generic";        // generic | plaintext | mobile
      let gradeType = "Adult";     // Adult | Cadet

      // ONLY the "no auxiliary line" graphic
      const LOGO_URL = "https://cdn-assets-cloud.frontify.com/s3/frontify-cloud-files-us/eyJwYXRoIjoiZnJvbnRpZnlcL2ZpbGVcLzkzRHN5eTR0WmI3MXIydXRpY2FzLnBuZyJ9:frontify:joUZ3kIja1IrzlO8KaboqI-LUNdOHqpimmyV8BsveqA?width=2400";

      const vals = {
        name: "Jane Doe",
        grade: "2nd Lt.",
        wing: "",
        title: "",
        phone_1_type: "M",
        phone_1: "",
        phone_2_type: "M",
        phone_2: "",
        phone_3_type: "M",
        phone_3: "",
        website_text: "",
        website_url: ""
      };

      const $ = (id) => document.getElementById(id);

      function sanitizeText(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function normalizeTel(s) {
        const raw = String(s || "").trim();
        if (!raw) return "";
        let out = "";
        for (let i = 0; i < raw.length; i++) {
          const ch = raw[i];
          if ((ch >= "0" && ch <= "9") || (ch === "+" && out.length === 0)) out += ch;
        }
        return out;
      }

      function showTitleWarning() {
        const el = $("title_warning");
        el.classList.add("show");
        window.clearTimeout(showTitleWarning._t);
        showTitleWarning._t = window.setTimeout(() => {
          el.classList.remove("show");
        }, 2200);
      }

      function limitTitleLines() {
        const textarea = $("title");
        const lines = textarea.value.split(/\r?\n/);

        if (lines.length > 2) {
          textarea.value = lines.slice(0, 2).join("\n");
          showTitleWarning();
          return true;
        }
        return false;
      }

      const template = {
        generic: () => {
          const name = sanitizeText(vals.name || "Jane Doe");
          const grade = sanitizeText(vals.grade || "");
          const cadetPrefix = (gradeType === "Cadet") ? "Cadet " : "";

          // If grade is a courtesy title (Mr./Ms./Mrs.), don't add extra spacing rules; treat it as a prefix.
          const courtesyTitles = new Set(["Mr.", "Ms.", "Mrs."]);
          const isCourtesy = courtesyTitles.has(vals.grade);

          const gradePart = grade
            ? (isCourtesy ? `${grade} ` : `${grade} `)
            : "";

          const titleRaw = vals.title || "";
          const titleHtml = sanitizeText(titleRaw)
            .split(/\r?\n/)
            .filter(line => line.trim() !== "")
            .slice(0, 2)
            .join("<br />");

          const wText = sanitizeText(vals.website_text || "");
          const wUrl = sanitizeText(vals.website_url || "");

          const phoneRows = [
            { t: vals.phone_1_type, n: vals.phone_1 },
            { t: vals.phone_2_type, n: vals.phone_2 },
            { t: vals.phone_3_type, n: vals.phone_3 }
          ]
            .filter(p => String(p.n || "").trim().length > 0)
            .map(p => {
              const shown = sanitizeText(p.n);
              const tel = normalizeTel(p.n);
              const href = tel ? `tel:${tel}` : "";
              return `<p style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #000000; font-weight: normal; margin: 0 0 5px;">
                (${sanitizeText(p.t)}) <a href="${href}" style="color: #000000; text-decoration: none;">${shown}</a>
              </p>`;
            })
            .join("");

          // Since we're always using the "no auxiliary line" logo now:
          const orgLine = "";

          return `<!DOCTYPE html>
<html><body><br />
  <h1 style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #001871; font-weight: bold; margin: 0 0 5px;">
    ${cadetPrefix}${gradePart}${name}
  </h1>

  ${titleHtml ? `<h2 style="font-size: 12px; line-height: 14px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #000000; font-weight: normal; margin: 0 0 5px;">
    ${titleHtml}
  </h2>` : ""}

  <h2 style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; color: #000000; margin: 0 0 20px;">
    ${orgLine}
  </h2>

  ${phoneRows}

  <p style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; margin: 0 0 5px;">
    <a href="https://www.GoCivilAirPatrol.com" style="color: #000000; text-decoration: underline;">GoCivilAirPatrol.com</a>
  </p>

  ${(wText && wUrl) ? `<p style="font-size: 12px; line-height: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; margin: 0 0 5px;">
    <a href="${wUrl}" style="color: #000000; text-decoration: underline;">${wText}</a>
  </p>` : ""}

  <a href="https://www.GoCivilAirPatrol.com">
    <img src="${LOGO_URL}"
         style="display:block; border:0; outline:none; text-decoration:none; width:200px; max-width:200px; height:auto;"
         alt="Civil Air Patrol Logo" />
  </a>

  <p style="font-size: 12px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; font-style: italic; line-height: 14px; margin: 0 0 5px;">
    Volunteers serving America's communities, saving lives, and shaping futures.
  </p>
</body></html>`;
        },

        plaintext: () => {
          const cadetPrefix = (gradeType === "Cadet") ? "Cadet " : "";
          const gradePart = vals.grade ? `${vals.grade} ` : "";
          const name = vals.name || "Jane Doe";

          const lines = [];
          lines.push(`${cadetPrefix}${gradePart}${name}`.trim());

          if (vals.title && vals.title.trim()) {
            vals.title.split(/\r?\n/)
              .filter(line => line.trim() !== "")
              .slice(0, 2)
              .forEach(line => lines.push(line.trim()));
          }

          // No-aux logo => org line is "Civil Air Patrol"
          lines.push("");

          const phones = [
            { t: vals.phone_1_type, n: vals.phone_1 },
            { t: vals.phone_2_type, n: vals.phone_2 },
            { t: vals.phone_3_type, n: vals.phone_3 }
          ].filter(p => String(p.n || "").trim());

          for (const p of phones) {
            lines.push(`(${p.t}) ${String(p.n).trim()}`);
          }

          lines.push("");
          lines.push("https://www.GoCivilAirPatrol.com");

          if (vals.website_url && vals.website_url.trim()) {
            lines.push(vals.website_url.trim());
          }

          return lines.join("\n");
        },

        mobile: () => {
          const cadetPrefix = (gradeType === "Cadet") ? "Cadet " : "";
          const gradePart = vals.grade ? `${vals.grade} ` : "";
          const name = vals.name || "Jane Doe";

          const wing = (vals.wing && vals.wing.trim())
            ? `, ${vals.wing.trim().toUpperCase()}`
            : "";

          return `${cadetPrefix}${gradePart}${name}${wing}\nCivil Air Patrol`;
        }
      };

      function gateGrades() {
        const gradeSelect = $("grade");
        const options = Array.from(gradeSelect.querySelectorAll("option"));

        for (const opt of options) {
          const isCadet = opt.getAttribute("data-cadet") === "true";
          const isAdult = opt.getAttribute("data-adult") === "true";
          const isAny = opt.getAttribute("data-any") === "true";

          if (isAny) {
            opt.disabled = false;
            continue;
          }

          if (gradeType === "Adult") {
            opt.disabled = isCadet;
          } else {
            opt.disabled = isAdult;
          }
        }

        const selected = gradeSelect.selectedOptions[0];
        if (selected && selected.disabled) {
          gradeSelect.value = (gradeType === "Cadet") ? "Airman" : "2nd Lt.";
        }
      }

      function applyTypeUI() {
        const isMobile = type === "mobile";
        const isPlain = type === "plaintext";

        $("f_wing").classList.toggle("hidden", !isMobile);
        $("f_title").classList.toggle("hidden", isMobile);
        $("f_phone").classList.toggle("hidden", isMobile);
        $("f_website").classList.toggle("hidden", isMobile);

        $("website_text").disabled = isPlain;

        if (isMobile) $("title_warning").classList.remove("show");
      }

      function readInputsToState() {
        vals.grade = $("grade").value;

        const nm = $("name").value.trim();
        vals.name = nm ? nm : "Jane Doe";

        vals.wing = $("wing").value.trim();
        vals.title = $("title").value;

        vals.phone_1_type = $("phone_1_type").value;
        vals.phone_1 = $("phone_1").value.trim();

        vals.phone_2_type = $("phone_2_type").value;
        vals.phone_2 = $("phone_2").value.trim();

        vals.phone_3_type = $("phone_3_type").value;
        vals.phone_3 = $("phone_3").value.trim();

        vals.website_text = $("website_text").value.trim();
        vals.website_url = $("website_url").value.trim();
      }

      function updateOutputAndPreview() {
        readInputsToState();

        const out = template[type]();

        $("preview_rendered").innerHTML = (type === "generic")
          ? out
          : `<div style="white-space: pre-wrap; font-family: Arial, sans-serif; font-size: 14px; line-height: 1.45;">${sanitizeText(out)}</div>`;

        $("preview_code").textContent = out;

        const mode = $("preview_mode").value;
        $("preview_rendered").classList.toggle("hidden", mode !== "rendered");
        $("preview_code").classList.toggle("hidden", mode !== "code");
      }

      function init() {
        type = $("type").value;
        gradeType = $("grade_type").value;

        gateGrades();
        applyTypeUI();

        limitTitleLines();
        updateOutputAndPreview();

        $("type").addEventListener("change", () => {
          type = $("type").value;
          applyTypeUI();
          updateOutputAndPreview();
        });

        $("grade_type").addEventListener("change", () => {
          gradeType = $("grade_type").value;
          gateGrades();
          updateOutputAndPreview();
        });

        $("grade").addEventListener("change", updateOutputAndPreview);

        $("title").addEventListener("input", () => {
          limitTitleLines();
          updateOutputAndPreview();
        });

        $("title").addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            const lines = this.value.split(/\r?\n/);
            if (lines.length >= 2) e.preventDefault();
          }
        });

        const inputs = [
          "name", "wing",
          "phone_1_type", "phone_1",
          "phone_2_type", "phone_2",
          "phone_3_type", "phone_3",
          "website_text", "website_url"
        ];

        for (const id of inputs) {
          const el = $(id);
          el.addEventListener("input", updateOutputAndPreview);
          el.addEventListener("blur", updateOutputAndPreview);
          el.addEventListener("change", updateOutputAndPreview);
        }

        $("preview_mode").addEventListener("change", updateOutputAndPreview);
      }

      document.addEventListener("DOMContentLoaded", init);
    })();
  </script>
</body>
</html>
